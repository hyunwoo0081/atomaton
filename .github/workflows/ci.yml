name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build API
        run: pnpm build:api

      - name: Build Web
        run: pnpm build:web

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        working-directory: apps/web

      - name: Run E2E Tests
        run: pnpm test:e2e
        env:
          CI: true
