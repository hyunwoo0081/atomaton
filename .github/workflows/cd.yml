name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm build:web

      - name: Deploy Frontend via Rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "apps/web/dist/"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: ${{ secrets.PWD }}

  deploy-backend:
    runs-on: ubuntu-latest
    environment: production-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm build:api

      - name: Build DB
        run: pnpm --filter @atomaton/db build

      - name: Deploy Backend via Rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: ${{ secrets.PWD }}
          EXCLUDE: "/node_modules/, /apps/web/, /.git/, /.github/, /dist/, /test-results/, /playwright-report/"

      - name: Post-deployment commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL
          script: |
            # Start as login shell to load profiles
            set -e
            
            # Additional PATH security
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:/home/${{ secrets.SSH_USER }}/.pnpm-global/bin:/home/${{ secrets.SSH_USER }}/.npm-global/bin
            
            # Find pnpm and pm2
            PNPM_BIN=$(command -v pnpm || echo "/home/${{ secrets.SSH_USER }}/.local/share/pnpm/pnpm")
            PM2_BIN=$(command -v pm2 || echo "pm2")
            
            echo "Using pnpm at: $PNPM_BIN"
            echo "Using pm2 at: $PM2_BIN"
            
            cd ${{ secrets.PWD }}
            
            # Install production dependencies
            $PNPM_BIN install --prod --frozen-lockfile
            
            # Generate Prisma Client
            $PNPM_BIN --filter @atomaton/db exec prisma generate
            
            # Run database migrations
            $PNPM_BIN --filter @atomaton/db exec prisma migrate deploy
            
            # Restart PM2 process
            $PM2_BIN restart atomaton-api || $PM2_BIN start apps/api/dist/index.js --name "atomaton-api"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
